<!DOCTYPE html>
<html>
<head>
  <title>My Interactive Cloud Web Page</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background-color: #f0f0f0;
      padding: 50px;
    }
    h1 {
      color: #333;
    }
    img {
      width: 150px;
      transition: transform 0.3s;
      cursor: pointer;
    }
    img:hover {
      transform: scale(1.5); /* увеличиваем при наведении */
    }
    button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 20px;
      background-color: #4CAF50;
      color: white;
      border: none;
      border-radius: 5px;
    }
    button:hover {
      background-color: #45a049;
    }
  </style>
</head>
<body>

<h1>Welcome to My Interactive Page!</h1>
<p id="welcomeText">Click the button below to change this text!</p>

<img src="https://via.placeholder.com/150" alt="Sample Image">

<br>
<button onclick="changeText()">Click Me!</button>

<a href="https://www.google.com" target="_blank">Visit Google</a>

<script>
  function changeText() {
    const p = document.getElementById('welcomeText');
    p.innerHTML = "You just clicked the button! 🎉";
    document.body.style.backgroundColor = '#ffe4e1'; // меняем фон
  }
</script>

</body>
</html>
